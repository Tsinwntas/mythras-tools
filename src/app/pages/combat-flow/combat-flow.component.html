<div class="app-shell">
<div class="app-container">
<mat-toolbar class="app-section app-toolbar-wrap">
    <open-modal *ngIf="userType==UserTypes.GM"  modal="initiative" [prop]="round">
        <button mat-button>
            Initiative Notes
        </button>
    </open-modal>
    <open-modal *ngIf="userType==UserTypes.PLAYER" modal="character">
        <button mat-button>
            Character
        </button>
    </open-modal>
    <open-modal modal="fatigue">
        <button mat-button>
            Fatigue
        </button>
    </open-modal>
    <open-modal modal="success-levels">
        <button mat-button>
            Roll Check
        </button>
    </open-modal>
    <open-modal modal="hit-locations">
        <button mat-button>
            Hit Locations
        </button>
    </open-modal>
    <open-modal modal="offensive-specials">
        <button mat-button>
            Offensive Special Effects
        </button>
    </open-modal>
    <open-modal modal="defensive-specials">
        <button mat-button>
            Defensive Special Effects
        </button>
    </open-modal>
    <open-modal modal="situational">
        <button mat-button>
            Situational Modifier
        </button>
    </open-modal>
    <open-modal modal="ignore" class="back">
        <button mat-raised-button color="accent" routerLink="/menu">Back to Main Menu</button>
    </open-modal>
</mat-toolbar>
<div class="page-wrapper app-form-stack">
    <div class="user-type-selection" *ngIf="userType == UserTypes.UNKNOWN" >
        <h3 class="view-as">Select from which perspective to view the Combat Flow:</h3>
        <button mat-raised-button color="primary" (click)="setUserType(UserTypes.GM)">GM</button>
        <button mat-raised-button color="accent" (click)="setUserType(UserTypes.PLAYER)">Player</button>
    </div>
    <div class="combat-flow-wrapper" *ngIf="userType != UserTypes.UNKNOWN" >
        <button mat-icon-button class="sidebar-toggle" (click)="toggleSidebar()" aria-label="Toggle combat section menu">
            <mat-icon>menu</mat-icon>
        </button>
        <div *ngIf="loading" class="loading-wrap">
            <mat-spinner></mat-spinner>
        </div>
        <div class="combat-layout" [ngStyle]="{'display': loading ? 'none' : 'grid' }">
            <aside class="combat-sidebar app-card-surface" [class.open]="sidebarOpen">
                <h3>Sections</h3>
                <div class="combat-progress">{{pageState + 1}} / {{getStates().length}}</div>
                <div class="step-list">
                    <button
                        type="button"
                        class="step-list-item"
                        *ngFor="let state of getStates(); let i = index"
                        [class.active]="pageState === i"
                        (click)="goToStep(i)"
                    >
                        <span class="step-index">{{i + 1}}</span>
                        <span class="step-name">{{state.stepLabel}}</span>
                    </button>
                </div>
            </aside>
            <section class="combat-main">
                <mat-card class="app-card-surface">
                    <mat-card-header>
                        <h3>{{getCurrentState().stepLabel}}</h3>
                        <span *ngIf="userType == UserTypes.GM && pageState == 2" class="round-span">
                            <mat-form-field>
                                <mat-label>Round</mat-label>
                                <input matInput placeholder="1" type="number" [(ngModel)]="round.round">
                            </mat-form-field>
                        </span>
                    </mat-card-header>	
                    <mat-card-content >
                        <div class="state-content-wrapper">
                            <ng-container #activeStateHost></ng-container>
                        </div>
                        <div *ngIf="getCurrentState().next == undefined" class="app-action-row">
                            <button mat-stroked-button (click)="nextStep()">Next</button>
                        </div>
                        <div *ngIf="getCurrentState().next != undefined" class="app-action-row">
                            <button mat-stroked-button *ngFor="let button of getCurrentState().next" (click)="stepTo(button.target, button.click)">{{button.label? button.label : 'Next'}}</button>
                        </div>
                    </mat-card-content>
                </mat-card>
            </section>
        </div>
    </div>
    <div class="user-type-reselection" *ngIf="userType != UserTypes.UNKNOWN" >
        <div>View as:</div>
        <button mat-raised-button color="primary" (click)="setUserType(UserTypes.GM)" *ngIf="userType == UserTypes.PLAYER">GM</button>
        <button mat-raised-button color="accent" (click)="setUserType(UserTypes.PLAYER)" *ngIf="userType == UserTypes.GM">Player</button>
    </div>
</div>
</div>
</div>
