<div>
    <table mat-table [dataSource]="tableData">
        
        <ng-container *ngFor="let col of columnDefinitions"  [matColumnDef]="col">
            <th mat-header-cell *matHeaderCellDef [ngStyle]="highlightedColumns.includes(col) ? {'background-color':'#c0c0c05e'} : null"> {{columnHeaderMap[col]}} </th>
            <td mat-cell *matCellDef="let element" [ngStyle]="highlightedColumns.includes(col) ? {'background-color':'#c0c0c05e'} : null"> {{element[col]}} </td>
        </ng-container>
        
        <tr mat-header-row *matHeaderRowDef="columnDefinitions; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: columnDefinitions;"></tr>
    </table>
</div>
